<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#080808" stroke="#1a1a1a" stroke-width="1"/>
  
  <!-- Glow aura -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGreen)" opacity="0.6"/>

  <!-- Ghost body shape -->
  <path d="M60 130 Q60 75 100 65 Q140 75 140 130 L140 155 Q130 148 120 155 Q110 162 100 155 Q90 148 80 155 Q70 162 60 155 Z"
        fill="#0d0d0d" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Skull dome -->
  <ellipse cx="100" cy="100" rx="36" ry="34" fill="#111" stroke="#00ff88" stroke-width="1.2" filter="url(#glow)"/>

  <!-- Left eye socket -->
  <ellipse cx="88" cy="97" rx="9" ry="10" fill="#00ff88" opacity="0.9" filter="url(#softglow)"/>
  <ellipse cx="88" cy="97" rx="5" ry="6" fill="#080808"/>
  <!-- Left eye glow dot -->
  <circle cx="86" cy="95" r="2" fill="#00ff88" opacity="0.8"/>

  <!-- Right eye socket -->
  <ellipse cx="112" cy="97" rx="9" ry="10" fill="#00ff88" opacity="0.9" filter="url(#softglow)"/>
  <ellipse cx="112" cy="97" rx="5" ry="6" fill="#080808"/>
  <!-- Right eye glow dot -->
  <circle cx="110" cy="95" r="2" fill="#00ff88" opacity="0.8"/>

  <!-- Nose cavity -->
  <path d="M97 107 L100 112 L103 107 Z" fill="#00ff88" opacity="0.5"/>

  <!-- Teeth -->
  <rect x="88" y="114" width="5" height="6" rx="1" fill="#00ff88" opacity="0.7"/>
  <rect x="95" y="114" width="5" height="7" rx="1" fill="#00ff88" opacity="0.9"/>
  <rect x="102" y="114" width="5" height="6" rx="1" fill="#00ff88" opacity="0.7"/>
  <!-- Jaw line -->
  <path d="M84 114 Q100 122 116 114" stroke="#00ff88" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Ghost wavy bottom squiggles -->
  <path d="M60 155 Q65 148 70 155 Q75 162 80 155 Q85 148 90 155 Q95 162 100 155 Q105 148 110 155 Q115 162 120 155 Q125 148 130 155 Q135 162 140 155"
        stroke="#00ff88" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- Floating particles -->
  <circle cx="55" cy="85" r="1.5" fill="#00ff88" opacity="0.4"/>
  <circle cx="148" cy="90" r="1" fill="#00ff88" opacity="0.3"/>
  <circle cx="50" cy="110" r="1" fill="#00ff88" opacity="0.2"/>
  <circle cx="152" cy="115" r="1.5" fill="#00ff88" opacity="0.3"/>
  <circle cx="70" cy="60" r="1" fill="#00ff88" opacity="0.25"/>
  <circle cx="130" cy="62" r="1" fill="#00ff88" opacity="0.2"/>

  <!-- Crack on skull top -->
  <path d="M100 68 L97 80 L102 88" stroke="#00ff88" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Outer ring decoration -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="#00ff88" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.2"/>
</svg>
